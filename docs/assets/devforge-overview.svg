<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" role="img" aria-label="devforge: a human-gated coding loop. The orchestrator routes, subagents judge, and files are the only handoff. The run flows from task through triage, verify, design, and human iteration to the design gate, then a cyclic implementation loop of implement, oracle, and reviewers that repeats until the oracle is green with no blocker or major finding, then final reviewers, fulfillment, and a create-PR confirm before commit. The two human gates are aligned full-width checkpoints.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0b1017"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#bc8cff"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#132a1c"/>
      <stop offset="1" stop-color="#16351f"/>
    </linearGradient>
    <linearGradient id="gate" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1c1503"/>
      <stop offset="1" stop-color="#211803"/>
    </linearGradient>
    <radialGradient id="ring" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0.62" stop-color="#0c1119"/>
      <stop offset="0.82" stop-color="#0e1420"/>
      <stop offset="1" stop-color="#0c1119"/>
    </radialGradient>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#7d8590"/>
    </marker>
    <marker id="ah-amber" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#d29922"/>
    </marker>
    <marker id="ah-blue" markerWidth="11" markerHeight="11" refX="7" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#58a6ff"/>
    </marker>
    <marker id="ah-green" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#3fb950"/>
    </marker>
    <marker id="ah-red" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#f85149"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="1600" rx="24" fill="url(#bg)"/>
  <rect x="0.75" y="0.75" width="1198.5" height="1598.5" rx="23.5" fill="none" stroke="#21262d" stroke-width="1.5"/>

  <!-- ===== Header ===== -->
  <rect x="64" y="44" width="44" height="44" rx="12" fill="url(#logo)"/>
  <path d="M78 66 h16 M86 58 v16" stroke="#0d1117" stroke-width="3.5" stroke-linecap="round"/>
  <text x="122" y="70" font-size="40" font-weight="700" fill="#e6edf3">devforge</text>
  <text x="124" y="98" font-size="16" fill="#8b949e">A human-gated coding loop for Claude Code &#8212; <tspan fill="#58a6ff" font-family="monospace">/devforge &lt;task&gt;</tspan></text>

  <rect x="700" y="50" width="436" height="36" rx="18" fill="#161b22" stroke="#30363d"/>
  <text x="918" y="73" font-size="13" text-anchor="middle" fill="#8b949e">orchestrator routes <tspan fill="#484f58">&#183;</tspan> subagents judge <tspan fill="#484f58">&#183;</tspan> files are the handoff</text>

  <line x1="64" y1="128" x2="1136" y2="128" stroke="#21262d" stroke-width="1.5"/>

  <!-- ===== THE IDEA ===== -->
  <text x="64" y="166" font-size="13" letter-spacing="3" font-weight="600" fill="#6e7681">THE IDEA</text>

  <rect x="64" y="182" width="336" height="150" rx="14" fill="#0f141b" stroke="#30363d"/>
  <text x="90" y="228" font-size="20" font-weight="600" fill="#58a6ff">Orchestrator routes</text>
  <rect x="90" y="238" width="42" height="3" rx="1.5" fill="#58a6ff"/>
  <text x="90" y="270" font-size="13.5" fill="#8b949e">Dispatches each stage and records</text>
  <text x="90" y="290" font-size="13.5" fill="#8b949e">your feedback verbatim. Never</text>
  <text x="90" y="310" font-size="13.5" fill="#8b949e">authors a judgment file itself.</text>

  <rect x="432" y="182" width="336" height="150" rx="14" fill="#0f141b" stroke="#30363d"/>
  <text x="458" y="228" font-size="20" font-weight="600" fill="#bc8cff">Subagents judge</text>
  <rect x="458" y="238" width="42" height="3" rx="1.5" fill="#bc8cff"/>
  <text x="458" y="270" font-size="13.5" fill="#8b949e">Every judgment is one subagent</text>
  <text x="458" y="290" font-size="13.5" fill="#8b949e">writing one file, with a</text>
  <text x="458" y="310" font-size="13.5" fill="#8b949e">deliberately narrow read set.</text>

  <rect x="800" y="182" width="336" height="150" rx="14" fill="#0f141b" stroke="#30363d"/>
  <text x="826" y="228" font-size="20" font-weight="600" fill="#3fb950">Files are the handoff</text>
  <rect x="826" y="238" width="42" height="3" rx="1.5" fill="#3fb950"/>
  <text x="826" y="270" font-size="13.5" fill="#8b949e">Chat is ephemeral. Each stage</text>
  <text x="826" y="290" font-size="13.5" fill="#8b949e">writes one file; each role reads</text>
  <text x="826" y="310" font-size="13.5" fill="#8b949e">only what it needs &#8212; stays blind.</text>

  <rect x="64" y="352" width="520" height="46" rx="10" fill="#14110a" stroke="#d29922"/>
  <text x="88" y="381" font-size="15" font-weight="600" fill="#d29922">&#9670; Two human gates<tspan font-weight="400" fill="#8b949e">   &#8212;  design gate &#183; create-PR confirm</tspan></text>

  <rect x="616" y="352" width="520" height="46" rx="10" fill="#0f141b" stroke="#30363d"/>
  <text x="640" y="381" font-size="15" font-weight="600" fill="#bc8cff">Blind judgments<tspan font-weight="400" fill="#8b949e">   &#8212;  architect &#8869; criteria &#8869; reviewers</tspan></text>

  <line x1="64" y1="428" x2="1136" y2="428" stroke="#21262d" stroke-width="1.5"/>

  <!-- ===== THE FLOW ===== -->
  <text x="64" y="466" font-size="13" letter-spacing="3" font-weight="600" fill="#6e7681">THE FLOW</text>
  <text x="1136" y="466" font-size="12.5" text-anchor="end" fill="#8b949e"><tspan fill="#d29922" font-weight="600">&#9670;</tspan> human gate      <tspan fill="#58a6ff" font-weight="600">&#8635;</tspan> loop      <tspan fill="#d29922">&#8212; &#8212;</tspan> reopen</text>

  <!-- Intake row -->
  <rect x="64" y="496" width="244" height="62" rx="12" fill="#0f141b" stroke="#30363d" stroke-width="1.5"/>
  <rect x="64" y="496" width="5" height="62" rx="2.5" fill="#58a6ff"/>
  <text x="88" y="527" font-size="15.5" font-weight="600" fill="#e6edf3" font-family="monospace">/devforge &lt;task&gt;</text>
  <text x="88" y="547" font-size="12" fill="#8b949e">start a new run</text>

  <rect x="340" y="496" width="244" height="62" rx="12" fill="#0f141b" stroke="#30363d" stroke-width="1.5"/>
  <rect x="340" y="496" width="5" height="62" rx="2.5" fill="#7d8590"/>
  <text x="364" y="527" font-size="15.5" font-weight="600" fill="#e6edf3">Triage</text>
  <text x="364" y="547" font-size="11.5" fill="#8b949e">PROCEED &#183; DEFER &#183; DECLINE</text>

  <rect x="616" y="496" width="244" height="62" rx="12" fill="#0f141b" stroke="#30363d" stroke-width="1.5"/>
  <rect x="616" y="496" width="5" height="62" rx="2.5" fill="#58a6ff"/>
  <text x="640" y="527" font-size="15.5" font-weight="600" fill="#e6edf3">Verify</text>
  <text x="640" y="547" font-size="12" fill="#8b949e">always &#183; claim ledger</text>

  <rect x="892" y="496" width="244" height="62" rx="12" fill="#0f141b" stroke="#30363d" stroke-width="1.5"/>
  <rect x="892" y="496" width="5" height="62" rx="2.5" fill="#bc8cff"/>
  <text x="916" y="527" font-size="15.5" font-weight="600" fill="#e6edf3">Design</text>
  <text x="916" y="547" font-size="12" fill="#8b949e">architect + criteria &#183; blind</text>

  <line x1="308" y1="527" x2="337" y2="527" stroke="#7d8590" stroke-width="1.8" marker-end="url(#ah)"/>
  <line x1="584" y1="527" x2="613" y2="527" stroke="#7d8590" stroke-width="1.8" marker-end="url(#ah)"/>
  <line x1="860" y1="527" x2="889" y2="527" stroke="#7d8590" stroke-width="1.8" marker-end="url(#ah)"/>

  <line x1="462" y1="558" x2="462" y2="574" stroke="#f85149" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ah-red)"/>
  <text x="462" y="592" font-size="11.5" text-anchor="middle" fill="#f85149">DEFER / DECLINE &#8594; stop</text>
  <line x1="738" y1="558" x2="738" y2="574" stroke="#f85149" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ah-red)"/>
  <text x="738" y="592" font-size="11.5" text-anchor="middle" fill="#f85149">stale / fixed &#8594; stop</text>

  <!-- Iterate -->
  <rect x="892" y="610" width="244" height="54" rx="12" fill="#0f141b" stroke="#30363d" stroke-width="1.5"/>
  <rect x="892" y="610" width="5" height="54" rx="2.5" fill="#3fb950"/>
  <text x="916" y="637" font-size="15.5" font-weight="600" fill="#e6edf3">Iterate with human</text>
  <text x="916" y="655" font-size="11.5" fill="#8b949e">one question at a time &#183; feedback</text>

  <line x1="1014" y1="558" x2="1014" y2="608" stroke="#7d8590" stroke-width="1.8" marker-end="url(#ah)"/>
  <line x1="1014" y1="664" x2="1014" y2="690" stroke="#7d8590" stroke-width="1.8" marker-end="url(#ah)"/>
  <path d="M1002 691 C 952 686, 952 670, 1002 665" fill="none" stroke="#d29922" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ah-amber)"/>
  <text x="944" y="682" font-size="11.5" text-anchor="end" fill="#d29922">revise</text>

  <!-- GATE 1 -->
  <rect x="64" y="692" width="1072" height="56" rx="12" fill="url(#gate)" stroke="#d29922" stroke-width="2"/>
  <text x="94" y="726" font-size="18" font-weight="700" fill="#f0d174">&#9670; &#9312;  DESIGN GATE<tspan font-size="14" font-weight="400" fill="#c9b783">    &#8212;  approve design &#183; success criteria &#183; reviewer panel</tspan></text>
  <text x="1112" y="726" font-size="12" text-anchor="end" fill="#8b949e">human approval</text>

  <!-- gate1 -> loop -->
  <line x1="600" y1="748" x2="600" y2="766" stroke="#7d8590" stroke-width="1.8" marker-end="url(#ah)"/>

  <!-- ===== IMPLEMENTATION LOOP (ring) ===== -->
  <rect x="210" y="752" width="780" height="398" rx="16" fill="url(#ring)" stroke="#30363d"/>
  <text x="240" y="786" font-size="12" letter-spacing="2.5" font-weight="600" fill="#6e7681">IMPLEMENTATION LOOP</text>

  <!-- ring arrows (clockwise): Implement -> Oracle -> Reviewers -> Implement -->
  <path d="M679.5 812.8 A150 150 0 0 1 749.4 953.1" fill="none" stroke="#58a6ff" stroke-width="2.4" marker-end="url(#ah-blue)"/>
  <path d="M675 1069.9 A150 150 0 0 1 525 1069.9" fill="none" stroke="#58a6ff" stroke-width="2.4" marker-end="url(#ah-blue)"/>
  <path d="M450.6 953.1 A150 150 0 0 1 520.5 812.8" fill="none" stroke="#58a6ff" stroke-width="2.4" marker-end="url(#ah-blue)"/>

  <!-- hub -->
  <text x="600" y="912" font-size="30" text-anchor="middle" fill="#58a6ff">&#8635;</text>
  <text x="600" y="944" font-size="12.5" text-anchor="middle" fill="#8b949e">repeat until the oracle is green</text>
  <text x="600" y="962" font-size="12.5" text-anchor="middle" fill="#8b949e">&amp; no blocker / major finding is open</text>

  <!-- Implement (top) -->
  <rect x="500" y="767" width="200" height="48" rx="11" fill="#111820" stroke="#3d4d63" stroke-width="1.5"/>
  <text x="600" y="789" font-size="15.5" font-weight="600" text-anchor="middle" fill="#e6edf3">Implement</text>
  <text x="600" y="806" font-size="11" text-anchor="middle" fill="#8b949e">apply the approved design</text>

  <!-- Oracle (lower-right) -->
  <rect x="630" y="991" width="200" height="48" rx="11" fill="#111a13" stroke="#2f5137" stroke-width="1.5"/>
  <text x="730" y="1013" font-size="15.5" font-weight="600" text-anchor="middle" fill="#e6edf3">Oracle</text>
  <text x="730" y="1030" font-size="11" text-anchor="middle" fill="#8b949e">type &#183; lint &#183; build &#183; tests</text>

  <!-- Reviewers (lower-left) -->
  <rect x="370" y="991" width="200" height="48" rx="11" fill="#16111f" stroke="#4a3a63" stroke-width="1.5"/>
  <text x="470" y="1013" font-size="15.5" font-weight="600" text-anchor="middle" fill="#e6edf3">Reviewers</text>
  <text x="470" y="1030" font-size="11" text-anchor="middle" fill="#8b949e">blind &#183; vs design + criteria</text>

  <!-- loop clean exit (straight down the spine) -->
  <line x1="600" y1="1092" x2="600" y2="1180" stroke="#3fb950" stroke-width="1.8" marker-end="url(#ah-green)"/>
  <text x="612" y="1124" font-size="11.5" fill="#3fb950">loop clean &#10003;</text>

  <!-- Final reviewers -->
  <rect x="460" y="1182" width="280" height="60" rx="12" fill="#0f141b" stroke="#30363d" stroke-width="1.5"/>
  <rect x="460" y="1182" width="5" height="60" rx="2.5" fill="#bc8cff"/>
  <text x="486" y="1213" font-size="15.5" font-weight="600" fill="#e6edf3">Final reviewers</text>
  <text x="486" y="1231" font-size="12" fill="#8b949e">may trigger fix rounds</text>

  <line x1="600" y1="1242" x2="600" y2="1268" stroke="#7d8590" stroke-width="1.8" marker-end="url(#ah)"/>

  <!-- Fulfillment -->
  <rect x="460" y="1270" width="280" height="60" rx="12" fill="#0f141b" stroke="#30363d" stroke-width="1.5"/>
  <rect x="460" y="1270" width="5" height="60" rx="2.5" fill="#3fb950"/>
  <text x="486" y="1301" font-size="15.5" font-weight="600" fill="#e6edf3">Fulfillment</text>
  <text x="486" y="1319" font-size="11.5" fill="#8b949e">criteria vs reality &#183; MET / NOT MET</text>

  <!-- reopen: one smooth curve back into the loop -->
  <path d="M740 1300 C 992 1296, 1036 1128, 992 1047" fill="none" stroke="#d29922" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ah-amber)"/>
  <text x="762" y="1192" font-size="11.5" fill="#d29922">findings / NOT MET &#8594; reopen</text>

  <!-- MET -> gate2 (straight) -->
  <line x1="600" y1="1330" x2="600" y2="1362" stroke="#7d8590" stroke-width="1.8" marker-end="url(#ah)"/>
  <text x="614" y="1350" font-size="11.5" fill="#3fb950">MET</text>

  <!-- GATE 2 (identical geometry to gate 1) -->
  <rect x="64" y="1364" width="1072" height="56" rx="12" fill="url(#gate)" stroke="#d29922" stroke-width="2"/>
  <text x="94" y="1398" font-size="18" font-weight="700" fill="#f0d174">&#9670; &#9313;  CREATE-PR CONFIRM<tspan font-size="14" font-weight="400" fill="#c9b783">    &#8212;  commit &#183; push &#183; open the pull request</tspan></text>
  <text x="1112" y="1398" font-size="12" text-anchor="end" fill="#8b949e">human approval</text>

  <line x1="600" y1="1420" x2="600" y2="1452" stroke="#7d8590" stroke-width="1.8" marker-end="url(#ah)"/>

  <!-- terminal -->
  <rect x="464" y="1454" width="272" height="52" rx="26" fill="url(#green)" stroke="#3fb950" stroke-width="1.5"/>
  <text x="600" y="1487" font-size="16" font-weight="600" text-anchor="middle" fill="#56d364">Commit &#183; push &#183; PR</text>

  <!-- review-only footnote -->
  <rect x="64" y="1516" width="1072" height="50" rx="10" fill="#0f141b" stroke="#30363d" stroke-dasharray="6 4"/>
  <text x="90" y="1539" font-size="12.5" fill="#8b949e"><tspan font-weight="600" fill="#58a6ff">Review-only path</tspan>  &#8212;  for &#8220;review PR / branch X&#8221;: triage &#183; verify &#183; design the scope &#183; run the approved panel on the existing diff &#183; report findings.</text>
  <text x="90" y="1557" font-size="12.5" fill="#6e7681">It enters the implementation loop only if you ask it to fix what the panel found.</text>
</svg>
